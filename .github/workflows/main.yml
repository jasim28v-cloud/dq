name: 🚀 Deploy ROYAL SCENT Luxury Store

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v3
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: 🔧 Generate Store Files
      run: |
        echo "🌟 بدء إنشاء متجر ROYAL SCENT..."
        python scraper.py
        echo "✅ تم إنشاء جميع الملفات"
    
    - name: 📂 Show Structure
      run: |
        echo "هيكل المشروع:"
        find . -type f | sort
    
    - name: 🚀 Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        publish_branch: gh-pages
        force_orphan: true
        commit_message: "🌟 نشر متجر العطور الفاخر [Ultra Glass Morphism]"
    
    - name: ✅ Success
      run: |
        echo "🎉 تم النشر بنجاح!"
        echo "🔗 https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
